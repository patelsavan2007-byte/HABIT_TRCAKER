{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account ✨</h2>
      <p>Start your habit-building journey</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" id="registerForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-input"
          placeholder="Your display name"
          required
          autocomplete="username"
          minlength="2"
          maxlength="50"
        >
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="you@example.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="Min 8 characters"
          required
          autocomplete="new-password"
          minlength="8"
        >
        <div class="form-hint">At least 8 characters with uppercase, lowercase & number</div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          class="form-input"
          placeholder="Repeat your password"
          required
          autocomplete="new-password"
        >
      </div>

      <button type="submit" class="btn-submit" id="registerBtn">
        Create Account 🚀
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const form = document.getElementById('registerForm');
  const password = document.getElementById('password');
  const confirm = document.getElementById('confirm_password');

  form.addEventListener('submit', function(e) {
    if (password.value !== confirm.value) {
      e.preventDefault();
      confirm.style.borderColor = '#e17055';
      confirm.style.boxShadow = '0 0 0 3px rgba(225, 112, 85, 0.3)';
      return;
    }
    const btn = document.getElementById('registerBtn');
    btn.textContent = 'Creating account...';
    btn.style.opacity = '0.7';
    btn.style.pointerEvents = 'none';
  });

  confirm.addEventListener('input', function() {
    if (password.value === confirm.value) {
      confirm.style.borderColor = '#00b894';
      confirm.style.boxShadow = '0 0 0 3px rgba(0, 184, 148, 0.2)';
    } else {
      confirm.style.borderColor = '#e17055';
      confirm.style.boxShadow = '0 0 0 3px rgba(225, 112, 85, 0.2)';
    }
  });
</script>
{% endblock %}
